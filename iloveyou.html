<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazón de Código Perfecto</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #ui {
            position: relative;
            /* Perspectiva para que se vea profundo como la foto */
            perspective: 600px;
        }

        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* Aquí aplicamos tu delay */
            animation: move 5000ms infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -300ms);
        }

        .love_word {
            display: block;
            color: #ea80b0;
            font-size: 1rem;
            font-weight: bold;
            /* Inclinación exacta de tu imagen */
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 8px #fff, 0 0 15px #ea80b0;
            white-space: nowrap;
            opacity: 0.8;
        }

        @keyframes move {
            0% { transform: translate(var(--x), var(--y)) scale(0.8) rotateY(0deg); }
            100% { transform: translate(var(--x), var(--y)) scale(1.1) rotateY(20deg); }
        }
    </style>
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const totalLineas = 150; // Más líneas para que el corazón se vea sólido

        for (let i = 1; i <= totalLineas; i++) {
            const div = document.createElement('div');
            div.className = 'love_horizontal';
            div.style.setProperty('--i', i);

            // FÓRMULA MATEMÁTICA DEL CORAZÓN (Paramétrica)
            const t = (i / totalLineas) * 2 * Math.PI;
            // Escala de tamaño del corazón
            const scale = 15; 
            
            // Ecuaciones: 
            // x = 16 * sin^3(t)
            // y = 13 * cos(t) - 5 * cos(2t) - 2 * cos(3t) - cos(4t)
            const x = 16 * Math.pow(Math.sin(t), 3) * scale;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;

            div.style.setProperty('--x', `${x}px`);
            div.style.setProperty('--y', `${y}px`);
            
            div.innerHTML = `<span class="love_word">I love you</span>`;
            ui.appendChild(div);
        }
    </script>
</body>
</html>
