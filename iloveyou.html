<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazón Infinito Original</title>
    <style>
        /* Base del escenario */
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
        }

        /* --- TU CSS ORIGINAL EMPIEZA AQUÍ --- */
        #ui .love_word {
            color: #ea80b0;
            font-size: 1.4rem;
            /* Respetamos tu transform original */
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff;
            letter-spacing: 2px;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        #ui .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* Usamos tu animación de 10000ms */
            animation: horizontal 10000ms infinite alternate ease-in-out;
            /* Usamos tu cálculo exacto de delay */
            animation-delay: calc(var(--i) * -300ms);
        }
        /* --- TU CSS ORIGINAL TERMINA AQUÍ --- */

        /* La animación que faltaba para crear el túnel 3D */
        @keyframes horizontal {
            0% {
                /* Nacen en el fondo formando el corazón pequeño */
                transform: translate(calc(var(--x) * 0.15), calc(var(--y) * 0.15)) translateZ(-1000px) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                /* Viajan hacia ti expandiéndose a su posición real */
                transform: translate(var(--x), var(--y)) translateZ(500px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="ui">
        </div>

    <script>
        const ui = document.getElementById('ui');
        const total = 120; // Cantidad de frases

        for (let i = 1; i <= total; i++) {
            const div = document.createElement('div');
            div.className = 'love_horizontal';
            div.style.setProperty('--i', i);

            // Coordenadas para que el túnel tenga forma de corazón
            const t = (i / total) * 2 * Math.PI;
            const escala = 18; 
            
            const x = 16 * Math.pow(Math.sin(t), 3) * escala;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * escala;

            div.style.setProperty('--x', `${x}px`);
            div.style.setProperty('--y', `${y}px`);
            
            div.innerHTML = `<span class="love_word">I love you</span>`;
            ui.appendChild(div);
        }
    </script>
</body>
</html>
