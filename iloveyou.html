<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazón 3D Real - The Coding Wizard Style</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px; /* Profundidad del túnel */
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
            /* Inclinación para que se vea como en el video */
            transform: rotateX(15deg) rotateY(0deg);
        }

        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* La animación de tu imagen original */
            animation: tunnel 8000ms infinite linear;
            animation-delay: calc(var(--i) * -150ms);
            opacity: 0;
        }

        .love_word {
            display: block;
            color: #ea80b0;
            font-size: 1.4rem;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            /* Inclinación y sombra de tu captura */
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff, 0 0 20px #ea80b0;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        /* ESTO CREA EL EFECTO DEL VIDEO */
        @keyframes tunnel {
            0% {
                /* Empieza al fondo, muy pequeño y en su posición del borde del corazón */
                transform: translate(calc(var(--x) * 0.1), calc(var(--y) * 0.1)) translateZ(-1200px) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                /* Viaja hacia la cámara expandiéndose a su posición real */
                transform: translate(var(--x), var(--y)) translateZ(600px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const totalLineas = 150; // Aumenté a 150 para que el corazón sea sólido

        for (let i = 1; i <= totalLineas; i++) {
            const div = document.createElement('div');
            div.className = 'love_horizontal';
            div.style.setProperty('--i', i);

            // FÓRMULA MATEMÁTICA DEL CORAZÓN (Ajustada para que no sea una línea)
            const t = (i / totalLineas) * 2 * Math.PI;
            const escala = 18; // Tamaño del corazón
            
            // Estas coordenadas definen cada punto del borde
            const x = 16 * Math.pow(Math.sin(t), 3) * escala;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * escala;

            div.style.setProperty('--x', `${x}px`);
            div.style.setProperty('--y', `${y}px`);
            
            div.innerHTML = `<span class="love_word">I love you</span>`;
            ui.appendChild(div);
        }
    </script>
</body>
</html>
