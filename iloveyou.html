<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazón Flow Animado</title>
    <style>
        /* FONDO Y ESCENA */
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* CONTENEDOR DE CADA LÍNEA */
        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* Se ubica en la coordenada X,Y del corazón */
            transform: translate(var(--x), var(--y));
            width: 300px; /* Ancho de la "pista" por donde corre el texto */
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* EL TEXTO QUE FLUYE (CSS de tu imagen + Correcciones) */
        .love_word {
            display: inline-block;
            color: #ea80b0;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #fff, 0 0 20px #ea80b0;
            white-space: nowrap;
            
            /* Inclinación original */
            transform: rotateZ(-30deg);
            
            /* ANIMACIÓN DE FLUJO */
            animation: flow 6000ms linear infinite;
            /* El delay que hacía que el corazón se vea por partes */
            animation-delay: calc(var(--i) * -400ms);
        }

        /* Movimiento de desplazamiento infinito */
        @keyframes flow {
            0% {
                transform: translateX(120%) rotateZ(-30deg);
            }
            100% {
                transform: translateX(-120%) rotateZ(-30deg);
            }
        }

        /* Brillo extra intermitente (opcional) */
        .love_horizontal:nth-child(even) .love_word {
            filter: brightness(1.3);
            animation-duration: 8000ms; /* Unas más lentas que otras */
        }
    </style>
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const total = 100; // Cantidad de capas para formar el corazón

        for (let i = 1; i <= total; i++) {
            const div = document.createElement('div');
            div.className = 'love_horizontal';
            div.style.setProperty('--i', i);

            // FÓRMULA DEL CORAZÓN
            const t = (i / total) * 2 * Math.PI;
            const escala = 16; 
            
            const x = 16 * Math.pow(Math.sin(t), 3) * escala;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * escala;

            div.style.setProperty('--x', `${x}px`);
            div.style.setProperty('--y', `${y}px`);
            
            // Texto repetido para que el bucle no tenga huecos
            div.innerHTML = `<span class="love_word">I love you • I love you • I love you</span>`;
            ui.appendChild(div);
        }
    </script>
</body>
</html>
