<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazón 3D Infinito</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Crucial para el efecto de túnel */
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(10deg); /* Inclinación ligera como el video */
        }

        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* La animación de tu imagen con el delay */
            animation: tunnel 10000ms infinite linear;
            animation-delay: calc(var(--i) * -300ms);
        }

        .love_word {
            display: block;
            color: #ea80b0;
            font-size: 1.4rem;
            font-family: Arial, sans-serif;
            font-weight: bold;
            /* Inclinación exacta de tu captura */
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        /* ANIMACIÓN DE TÚNEL HACIA ADELANTE */
        @keyframes tunnel {
            0% {
                /* Empieza lejos y pequeño (fondo del túnel) */
                transform: translate(var(--x), var(--y)) translateZ(-1000px) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                /* Viene hacia la cámara y se agranda */
                transform: translate(var(--x), var(--y)) translateZ(500px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const totalLineas = 100;

        for (let i = 1; i <= totalLineas; i++) {
            const div = document.createElement('div');
            div.className = 'love_horizontal';
            div.style.setProperty('--i', i);

            // Coordenadas fijas para que todas las líneas formen la silueta
            const t = (i / totalLineas) * 2 * Math.PI;
            const escala = 18; 
            
            const x = 16 * Math.pow(Math.sin(t), 3) * escala;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * escala;

            div.style.setProperty('--x', `${x}px`);
            div.style.setProperty('--y', `${y}px`);
            
            div.innerHTML = `<span class="love_word">I love you</span>`;
            ui.appendChild(div);
        }
    </script>
</body>
</html>
