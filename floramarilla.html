<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- AQUÍ EMPIEZA EL CSS (EL ESTILO) --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff4d6d;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Dibujo del Árbol */
        .tree-canvas {
            position: relative;
            width: 200px;
            height: 250px;
            margin: 20px auto;
        }

        .trunk {
            width: 16px;
            height: 80px;
            background: #5d4037;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
            animation: growTrunk 2s ease-out forwards;
        }

        .flower {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ffcc00; /* Color amarillo */
            border-radius: 50%;
            box-shadow: 0 0 8px #ffeb3b;
            opacity: 0;
            animation: bloom 1s ease-out forwards;
        }

        @keyframes growTrunk {
            from { height: 0; }
            to { height: 80px; }
        }

        @keyframes bloom {
            to { opacity: 1; transform: scale(1.2); }
        }

        /* Contador */
        .timer-box {
            background: #fff0f3;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px dashed #ff4d6d;
        }

        #timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #c9184a;
            line-height: 1.6;
        }

        .heart {
            color: #ff4d6d;
            display: inline-block;
            animation: beat .3s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Para mi novio <span class="heart">❤️</span></h1>
        <p>Eres lo más especial de mi vida.</p>

        <div class="tree-canvas" id="garden">
            <div class="trunk"></div>
            </div>

        <div class="timer-box">
            <p>Llevamos juntos:</p>
            <div id="timer">Cargando nuestro tiempo...</div>
        </div>

        <p style="margin-top: 20px; font-size: 0.9rem; color: #777;">
            Desde el 1 de junio de 2025
        </p>
    </div>

    <script>
        /* --- AQUÍ EMPIEZA EL JAVASCRIPT (LA LÓGICA) --- */
        
        // 1. Lógica del Contador
        const startDate = new Date('2025-06-01T00:00:00');

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerHTML = 
                `${days} días, ${hours} horas, <br>${minutes} min y ${seconds} seg`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // 2. Generar Flores Amarillas aleatoriamente en el árbol
        const garden = document.getElementById('garden');
        for (let i = 0; i < 30; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            
            // Posiciones aleatorias para formar la "copa" del árbol
            const x = Math.random() * 160 + 20; 
            const y = Math.random() * 120 + 20;
            
            flower.style.left = x + 'px';
            flower.style.top = y + 'px';
            flower.style.animationDelay = (Math.random() * 2 + 1.5) + 's';
            
            garden.appendChild(flower);
        }
    </script>
</body>
</html>
