<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazones CreateJS</title>
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body onload="init();">
    <canvas id="testCanvas"></canvas>

    <script>
        var canvas, stage, text, w, h;
        var hearts = [];

        function init() {
            canvas = document.getElementById("testCanvas");
            stage = new createjs.Stage(canvas);
            
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            // EL TEXTO (Tal cual tu imagen)
            text = new createjs.Text("the longer I'm with you\nthe more I love you", "bold 24px Arial", "#FFB6C1");
            text.textAlign = "center";
            text.lineHeight = 30;
            text.x = w / 2;
            text.y = h / 2;
            stage.addChild(text);

            // CONFIGURAR EL TICKER (El motor de animación)
            createjs.Ticker.timingMode = createjs.Ticker.RAF;
            createjs.Ticker.addEventListener("tick", tick);
        }

        function tick(event) {
            // 1. Crear corazones nuevos aleatoriamente
            if (Math.random() < 0.1) { 
                createHeart();
            }

            // 2. Animar corazones
            for (var i = 0; i < hearts.length; i++) {
                var heart = hearts[i];
                heart.y -= heart.speed; // Suben
                heart.alpha -= 0.005;   // Se desvanecen lento
                
                // Si el corazón desaparece, lo quitamos para no saturar la memoria
                if (heart.alpha <= 0) {
                    stage.removeChild(heart);
                    hearts.splice(i, 1);
                    i--;
                }
            }

            stage.update(event);
        }

        function createHeart() {
            var heart = new createjs.Shape();
            var size = Math.random() * 15 + 5;
            
            // Dibujar la forma de corazón
            heart.graphics.beginFill(createjs.Graphics.getRGB(255, 105, 180, Math.random() * 0.4 + 0.2));
            heart.graphics.moveTo(0, 0)
                          .curveTo(0, -size, -size, -size)
                          .curveTo(-size * 2, -size, -size * 2, 0)
                          .curveTo(-size * 2, size, 0, size * 2.5)
                          .curveTo(size * 2, size, size * 2, 0)
                          .curveTo(size * 2, -size, size, -size)
                          .curveTo(0, -size, 0, 0);
            
            // Posición inicial (abajo de la pantalla)
            heart.x = Math.random() * w;
            heart.y = h + 50;
            heart.speed = Math.random() * 2 + 1;
            heart.scaleX = heart.scaleY = Math.random() * 1 + 0.5;
            
            hearts.push(heart);
            // Los corazones se añaden al fondo (índice 0) para que el texto esté siempre arriba
            stage.addChildAt(heart, 0); 
        }
    </script>
</body>
</html>
