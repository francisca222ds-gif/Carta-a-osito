<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CreateJS Demo</title>
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body onload="init();">
    <canvas id="demoCanvas"></canvas>

    <script>
        var stage, w, h;
        var captureContainers = []; // Arreglo para guardar los contenedores

        function init() {
            // 1. Configurar el escenario
            var canvas = document.getElementById("demoCanvas");
            stage = new createjs.Stage(canvas);

            // Ajustar el canvas al tamaño de la ventana
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            // 2. El código de tu imagen
            var text = new createjs.Text(
                "the longer I'm with you the more I love you",
                "bold 24px Arial",
                "#FF69B4" // Cambié el color a rosa para que se vea sobre negro
            );
            text.textAlign = "center";
            text.x = w / 2;
            text.y = h / 2 - text.getMeasuredLineHeight();
            stage.addChild(text);

            for (var i = 0; i < 100; i++) {
                var captureContainer = new createjs.Container();
                captureContainer.cache(0, 0, w, h);
                captureContainers.push(captureContainer);
            }

            // 3. Actualizar el escenario para que se vea algo
            createjs.Ticker.addEventListener("tick", stage);
        }
    </script>
</body>
</html>
