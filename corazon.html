<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>corazones para mi hombre<3</title>
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body onload="init();">
    <canvas id="testCanvas"></canvas>

    <script>
        var canvas, stage, text, w, h;
        var hearts = [];

        function init() {
            canvas = document.getElementById("testCanvas");
            stage = new createjs.Stage(canvas);
            
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            
           text = new createjs.Text(
    "buenos dias amor, cada dia que amanece. nos miro y digo somos una gran pareja, pero sobretodo veo el hombre tan perfecto que eres y me asombro de estar contigo, te amo muchi vamos a hecharle ganas juntos no suelte mi manita venga lo amo mucho", 
    "bold 24px Arial", 
    "#FFB6C1"
);
text.textAlign = "center";
text.lineHeight = 30;


text.lineWidth = 400; 

text.x = w / 2;


text.y = h / 2 - (text.getBounds().height / 2); 

stage.addChild(text);


            
            createjs.Ticker.timingMode = createjs.Ticker.RAF;
            createjs.Ticker.addEventListener("tick", tick);
        }

        function tick(event) {
            
            if (Math.random() < 0.1) { 
                createHeart();
            }

            
            for (var i = 0; i < hearts.length; i++) {
                var heart = hearts[i];
                heart.y -= heart.speed; 
                heart.alpha -= 0.005;   
                
                
                if (heart.alpha <= 0) {
                    stage.removeChild(heart);
                    hearts.splice(i, 1);
                    i--;
                }
            }

            stage.update(event);
        }

        function createHeart() {
            var heart = new createjs.Shape();
            var size = Math.random() * 15 + 5;
            
            
            heart.graphics.beginFill(createjs.Graphics.getRGB(255, 105, 180, Math.random() * 0.4 + 0.2));
            heart.graphics.moveTo(0, 0)
                          .curveTo(0, -size, -size, -size)
                          .curveTo(-size * 2, -size, -size * 2, 0)
                          .curveTo(-size * 2, size, 0, size * 2.5)
                          .curveTo(size * 2, size, size * 2, 0)
                          .curveTo(size * 2, -size, size, -size)
                          .curveTo(0, -size, 0, 0);
            
            
            heart.x = Math.random() * w;
            heart.y = h + 50;
            heart.speed = Math.random() * 2 + 1;
            heart.scaleX = heart.scaleY = Math.random() * 1 + 0.5;
            
            hearts.push(heart);
            
            stage.addChildAt(heart, 0); 
        }
    </script>
</body>
</html>
